<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LUAN BINGO v10 | Secretariat Edition</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI',sans-serif;}
body{background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:12px;}
#app{max-width:1200px;margin:0 auto;}

/* ===== CARD ===== */
.card{background:white;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 12px 30px rgba(0,0,0,0.18);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}

/* ===== BOTONES ===== */
.btn{padding:11px 22px;border-radius:30px;border:none;font-weight:700;cursor:pointer;transition:.18s;font-size:.9rem;display:inline-flex;align-items:center;gap:6px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.2);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-primary{background:linear-gradient(135deg,#764ba2,#667eea);color:white;}
.btn-success{background:linear-gradient(135deg,#10b981,#059669);color:white;}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;}
.btn-warning{background:linear-gradient(135deg,#f59e0b,#d97706);color:white;}
.btn-info{background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;}
.btn-outline{background:transparent;border:2px solid #764ba2;color:#764ba2;}
.btn-gray{background:#94a3b8;color:white;}
.btn-wa{background:#25d366;color:white;}
.w100{width:100%;}

/* ===== INPUTS ===== */
input,select{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:12px;font-size:1rem;margin-bottom:10px;}
input:focus,select:focus{outline:none;border-color:#764ba2;}

/* ===== GALERÍA CARTONES ===== */
/* ── GALERÍA v9-style ── */
.galeria{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;background:#f8fafc;border-radius:14px;margin-top:10px;}
@media(min-width:600px){.galeria{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.galeria{grid-template-columns:repeat(4,1fr);}}
@media(min-width:1200px){.galeria{grid-template-columns:repeat(5,1fr);}}
.carton-container{width:100%;}
.mini-carton{background:white;border:2px solid #cbd5e1;border-radius:8px;padding:4px;cursor:pointer;transition:all .25s;box-shadow:0 4px 10px rgba(0,0,0,.1);display:flex;flex-direction:column;margin-bottom:4px;}
.mini-carton:hover{transform:translateY(-4px);border-color:#764ba2;box-shadow:0 10px 25px rgba(118,75,162,.35);}
.mini-carton.reservado{border-color:#a855f7;background:linear-gradient(135deg,#faf5ff,#f3e8ff);box-shadow:0 0 18px rgba(168,85,247,.4);}
.mini-carton-header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:3px 4px;border-radius:4px;text-align:center;margin-bottom:4px;display:flex;justify-content:center;align-items:center;gap:4px;font-size:.6rem;font-weight:bold;min-height:16px;}
.bingo-text{font-size:.5rem;opacity:.9;}
.carton-id{font-size:.6rem;font-weight:900;}
.carton-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;}
.carton-col{display:flex;flex-direction:column;gap:2px;}
.carton-header{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:4px;text-align:center;font-weight:bold;border-radius:3px;font-size:.7rem;min-height:18px;display:flex;align-items:center;justify-content:center;}
.carton-cell{background:#f1f5f9;padding:3px 1px;text-align:center;border-radius:2px;font-weight:bold;min-height:16px;display:flex;align-items:center;justify-content:center;font-size:.6rem;line-height:1;}
.carton-cell.free{background:#fef08a;color:#000;font-style:italic;font-size:.5rem;}
.carton-cell.cantado{background:#10b981;color:white;}
.cc{background:#f1f5f9;text-align:center;padding:5px 2px;border-radius:4px;font-size:.65rem;font-weight:600;}
.cc.libre{background:#fef08a;color:#854d0e;}
.cc.cantado{background:#10b981;color:white;}

/* ===== CHIPS ===== */
/* ── CHIPS RESERVAS estilo v9 ── */
@keyframes slideIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
.chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:30px;font-size:.82rem;font-weight:600;margin:3px;}
.chip-reservado{display:inline-flex;align-items:center;gap:8px;background:#a855f7;color:white;padding:8px 15px;border-radius:20px;margin:4px;font-weight:bold;font-size:.92rem;animation:slideIn .3s;}
.chip-cp-sel{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:white;padding:8px 15px;border-radius:20px;margin:4px;font-weight:bold;font-size:.92rem;animation:slideIn .3s;}
.chip-ok{background:#10b981;color:white;}
.chip-warn{background:#f59e0b;color:white;}
.chips-area{display:flex;flex-wrap:wrap;gap:4px;min-height:40px;padding:6px 0;}
/* ── SECCIÓN RESERVAS estilo v9 ── */
.section-reservas{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #10b981;border-radius:16px;padding:18px;margin-bottom:16px;}

/* ===== MODAL ===== */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9999;align-items:center;justify-content:center;padding:12px;}
.modal.on{display:flex;}
.modal-box{background:white;border-radius:24px;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;padding:24px;}

/* ===== TABLERO BINGO (admin) ===== */
.tablero{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:16px 0;}
.col-bingo{background:rgba(255,255,255,.12);border-radius:12px;padding:8px;}
.col-titulo{text-align:center;font-weight:bold;color:white;margin-bottom:6px;font-size:1.1rem;}
.nums-col{display:flex;flex-direction:column;gap:3px;}
.num-cel{background:rgba(255,255,255,.92);border-radius:5px;padding:3px 2px;text-align:center;font-size:.82rem;font-weight:bold;cursor:pointer;transition:all .15s;user-select:none;}
.num-cel:hover:not(.cantado){background:#fbbf24;transform:scale(1.08);}
.num-cel.cantado{background:#10b981;color:white;text-decoration:line-through;opacity:.75;cursor:default;}

/* ===== PATRON GRID ===== */
.patron-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0;}
.patron-cel{padding:14px;border-radius:10px;text-align:center;cursor:pointer;font-weight:bold;border:2px solid #cbd5e1;transition:.15s;}
.patron-cel.activo{background:#10b981;color:white;border-color:#10b981;}

/* ===== CP CREATOR ===== */
.cp-nums{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin:14px 0;}
.cp-btn{padding:8px;background:white;border:2px solid #cbd5e1;border-radius:8px;cursor:pointer;font-weight:bold;transition:.12s;}
.cp-btn.sel{background:#10b981;color:white;border-color:#10b981;}

/* ===== VERIFICACIÓN DUPLICADOS ===== */
.verif-ok{background:#d1fae5;border:2px solid #10b981;border-radius:12px;padding:14px;margin:10px 0;font-weight:bold;color:#065f46;}
.verif-err{background:#fee2e2;border:2px solid #ef4444;border-radius:12px;padding:14px;margin:10px 0;}

/* ===== LOGS ===== */
.logs{background:#0f172a;color:#94a3b8;padding:10px;border-radius:10px;font-family:monospace;font-size:.7rem;max-height:160px;overflow-y:auto;margin-top:10px;}

/* ===== UTILIDADES ===== */
.flex{display:flex;}.gap{gap:10px;}.wrap{flex-wrap:wrap;}.between{justify-content:space-between;}
.mt{margin-top:12px;}.mb{margin-bottom:12px;}.center{text-align:center;}
.badge{padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;display:inline-block;}
.badge-ok{background:#10b981;color:white;}.badge-warn{background:#f59e0b;color:white;}.badge-err{background:#ef4444;color:white;}
.proximidad-bar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;margin-top:4px;}
.prox-fill{height:100%;background:linear-gradient(90deg,#10b981,#f59e0b);border-radius:4px;transition:.4s;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.ganador-anim{animation:pulse .6s ease-in-out 3;}
</style>
</head>
<body>
<div id="fb-badge" style="position:fixed;top:10px;right:10px;padding:6px 14px;border-radius:20px;font-size:.82rem;font-weight:bold;z-index:9000;box-shadow:0 4px 10px rgba(0,0,0,.2);background:var(--wa);color:white;">⏳ Conectando...</div>
<div id="app" class="app"></div>

<script>
// ═══════════════════════════════════════════════
//  LUAN BINGO v10 — Secretariat Edition
//  Arquitectura: Store centralizado + renderApp()
// ═══════════════════════════════════════════════

// ── FIREBASE ──────────────────────────────────
const FB = {
    apiKey:"AIzaSyCzmWgMMliY-9U-Yx9iF6XSG5yRZnRnCp0",
    authDomain:"luanbingoadmin.firebaseapp.com",
    projectId:"luanbingoadmin",
    storageBucket:"luanbingoadmin.firebasestorage.app",
    messagingSenderId:"1052655189822",
    appId:"1:1052655189822:web:2129d493b1497f85ab366f"
};
if (!firebase.apps.length) firebase.initializeApp(FB);
const db = firebase.firestore();
// Auth anónima — requerida por las reglas Firestore
// Auth se maneja en init() esperando onAuthStateChanged

// ── NORMALIZACIÓN TELÉFONO ────────────────────
const normTel = t => {
    let n = t.replace(/\D/g,'');
    if (n.startsWith('0')) n = '58' + n.slice(1);
    return n;
};

// ── CONSTANTES ────────────────────────────────
const ADMIN_TEL = '584165402030';
const ADMIN_PASS = '7048425';
const LETRAS = ['B','I','N','G','O'];
const RANGOS = {B:[1,15],I:[16,30],N:[31,45],G:[46,60],O:[61,75]};
const COLS_CP = {B:5,I:5,N:4,G:5,O:5};

// ── STORE CENTRAL ─────────────────────────────
const S = {
    // Sesión
    user: null,           // {phone, alias}
    adminOk: false,
    fbConectado: false,

    // Cartones
    cartones: [],         // array de 660 + CPs cargados de Firebase
    misReservas: new Set(), // IDs reservados por user actual
    misCPs: [],           // CPs del user actual
    cpSeleccionados: [],  // CPs elegidos para jugar/pagar

    // Solicitud
    solicitudEnviada: false,
    verificacionOk: false,

    // Juego (admin)
    numerosCantados: [],
    patron: Array(5).fill(null).map(()=>Array(5).fill(false)),
    ganadores: [],
    modoJuego: 'aleatorio',

    // Hora inicio
    horaInicio: null,

    // Listeners activos
    _unsubCartones: null,
    _unsubRecientes: null,

    // Logs
    logs: []
};

// ── CARTONES FIJOS (array literal del v9) ─────
// Usamos el mismo generador determinístico del v9 para compatibilidad
// Se reemplaza por CARTONES_FIJOS del v9 si se tiene disponible
function generarCarton(id) {
    const rnd = s => { let x = Math.sin(s)*10000; return x-Math.floor(x); };
    let numbers = {};
    for (let l of LETRAS) {
        const [mn,mx] = RANGOS[l];
        const cant = COLS_CP[l];
        let nums = new Set(), seed = id * l.charCodeAt(0);
        while (nums.size < cant) {
            nums.add(mn + Math.floor(rnd(seed + nums.size) * (mx-mn+1)));
            seed++;
        }
        let arr = Array.from(nums);
        if (l==='N') arr.splice(2,0,'LIBRE');
        numbers[l] = arr;
    }
    return {id, numbers, esPersonalizado:false, reserved:false, paid:false,
            owner:null, ownerPhone:null, ownerAlias:null};
}
for (let i=1;i<=700;i++) S.cartones.push(generarCarton(i)); // ⚠️ LEY LUAN — NO MODIFICAR

// ── LOGGING ───────────────────────────────────
function log(msg) {
    S.logs.unshift(`[${new Date().toLocaleTimeString()}] ${msg}`);
    if (S.logs.length > 60) S.logs.pop();
    const el = document.getElementById('logs');
    if (el) el.innerHTML = S.logs.map(l=>`<div>${l}</div>`).join('');
}

// ── NOTIFICACIÓN FLOTANTE (como v9) ──────────
function notif(msg, tipo='success', dur=2000) {
    const prev = document.querySelector('.notif-flotante');
    if (prev) prev.remove();
    if (!document.getElementById('notif-css')) {
        const s = document.createElement('style');
        s.id = 'notif-css';
        s.textContent = `
        @keyframes nfIn{from{opacity:0;transform:translateX(-50%) translateY(-16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        @keyframes nfOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-10px)}}
        .notif-flotante{position:fixed;top:24%;left:50%;transform:translateX(-50%);
            padding:12px 28px;border-radius:40px;box-shadow:0 10px 25px rgba(0,0,0,.3);
            z-index:99999;font-size:1rem;font-weight:700;display:flex;align-items:center;
            gap:8px;min-width:200px;max-width:320px;text-align:center;color:white;
            animation:nfIn .35s ease;border:2px solid rgba(255,255,255,.25);}`;
        document.head.appendChild(s);
    }
    const el = document.createElement('div');
    el.className = 'notif-flotante';
    el.style.background = tipo==='success'?'#10b981':tipo==='error'?'#ef4444':'#f59e0b';
    const ico = tipo==='success'?'✅':tipo==='error'?'❌':'⚠️';
    el.innerHTML = `${ico} <span>${msg}</span>`;
    document.body.appendChild(el);
    setTimeout(()=>{ el.style.animation='nfOut .3s ease'; setTimeout(()=>el.remove(),300); }, dur);
}

// ── RENDER PRINCIPAL ──────────────────────────
function render() {
    if (!S.adminOk && !S.user) renderHome();
    else if (S.adminOk) renderAdmin();
    else renderJugador();
}

// ════════════════════════════════════════════
//  HOME
// ════════════════════════════════════════════
function renderHome() {
    const est = S.cartones.filter(c => !c.esPersonalizado);
    const libres  = est.filter(c => !c.reserved && !c.paid).length;
    const reserv  = est.filter(c => c.reserved && !c.paid).length;
    const pagados = est.filter(c => c.paid).length;
    set('app', `
    <div class="card center" style="max-width:540px;margin:40px auto;">
        <div style="font-size:3rem;">🎰</div>
        <h1 style="margin:10px 0 4px;background:linear-gradient(135deg,#764ba2,#667eea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">LUAN BINGO v10</h1>
        <p style="color:#64748b;margin-bottom:8px;">Secretariat Edition</p>
        <div id="fb-status" style="font-size:.82rem;margin-bottom:14px;font-weight:bold;color:#94a3b8;">⏳ Conectando...</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:16px;max-width:98%;">
            <div style="background:#f8fafc;border-radius:12px;padding:8px 4px;text-align:center;">
                <div style="font-size:1.8rem;font-weight:900;color:#764ba2;" id="st-total">${est.length}</div>
                <div style="font-size:.78rem;color:#64748b;">Total</div>
            </div>
            <div style="background:#f0fdf4;border-radius:12px;padding:12px;text-align:center;">
                <div style="font-size:1.8rem;font-weight:900;color:#10b981;" id="st-libre">${libres}</div>
                <div style="font-size:.78rem;color:#64748b;">Libres</div>
            </div>
            <div style="background:#faf5ff;border-radius:12px;padding:12px;text-align:center;">
                <div style="font-size:1.8rem;font-weight:900;color:#a855f7;" id="st-res">${reserv}</div>
                <div style="font-size:.78rem;color:#64748b;">Reservados</div>
            </div>
            <div style="background:#fffbeb;border-radius:12px;padding:12px;text-align:center;">
                <div style="font-size:1.8rem;font-weight:900;color:#f59e0b;" id="st-pay">${pagados}</div>
                <div style="font-size:.78rem;color:#64748b;">Jugando</div>
            </div>
        </div>
        <div class="flex gap wrap" style="justify-content:center;">
            <button class="btn btn-primary" onclick="renderLogin()">👥 SOY JUGADOR</button>
            <button class="btn btn-warning" onclick="renderLoginAdmin()">🛡️ ADMIN</button>
        </div>
        <div id="logs" class="logs mt"></div>
    </div>`);
}

// ── LOGIN JUGADOR ─────────────────────────────
function renderLogin() {
    set('app', `
    <div class="card" style="max-width:460px;margin:40px auto;">
        <h2>👋 Acceso Jugador</h2>
        <input type="tel" id="inp-phone" placeholder="Teléfono ej: 04141234567">
        <input type="text" id="inp-alias" placeholder="Tu nombre / alias">
        <button class="btn btn-success w100" onclick="loginJugador()">🎮 Entrar</button>
        <button class="btn btn-outline w100 mt" onclick="render()">← Volver</button>
        <div id="login-msg" style="min-height:20px;margin-top:8px;font-weight:bold;color:#ef4444;"></div>
        <div id="logs" class="logs mt"></div>
    </div>`);
    document.getElementById('inp-phone')?.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('inp-alias').focus(); });
    document.getElementById('inp-alias')?.addEventListener('keydown', e=>{ if(e.key==='Enter') loginJugador(); });
}

async function loginJugador() {
    const phone = normTel(document.getElementById('inp-phone').value.trim());
    const alias = document.getElementById('inp-alias').value.trim();
    const msg   = document.getElementById('login-msg');
    if (phone.length < 10) { msg.textContent='⚠️ Teléfono inválido'; return; }
    if (alias.length < 2)  { msg.textContent='⚠️ Ingresa tu nombre'; return; }
    msg.textContent = '⏳ Conectando...';
    S.user = {phone, alias};
    S.misReservas.clear(); S.cpSeleccionados=[]; S.misCPs=[];
    S.solicitudEnviada=false; S.verificacionOk=false;
    try {
        // Intentar Firebase directamente — si funciona, estamos conectados
        await db.collection('usuarios').doc(phone).set(
            {alias, phone, ultimoLogin: firebase.firestore.FieldValue.serverTimestamp()},
            {merge:true}
        );
        S.fbConectado = true;
        // Actualizar badge de estado en el panel jugador
        const fbEl = document.getElementById('p-fb-status');
        if (fbEl) { fbEl.textContent='🟢 Firebase conectado'; fbEl.style.color='#10b981'; }
        const fbB = document.getElementById('fb-badge');
        if (fbB) { fbB.textContent='🟢 Firebase'; fbB.style.background='#10b981'; }
        // Restaurar reservas del día
        const snap = await db.collection('cartones_estado')
            .where('reservedBy','==',phone).where('paid','==',false).get();
        snap.forEach(d => {
            const id = d.data().id || parseInt(d.id);
            S.misReservas.add(id);
            const c = S.cartones.find(x=>x.id===id);
            if(c){c.reserved=true;c.reservedBy=phone;c.reservedAlias=alias;}
        });
        // Cargar CPs del jugador
        await recargarCPsJugador(phone);
        suscribirCartones();
        log(`✅ ${alias} (${phone}) conectado`);
    } catch(e) {
        // Firebase no disponible — modo local
        S.fbConectado = false;
        const fbEl = document.getElementById('p-fb-status');
        if (fbEl) { fbEl.textContent='🔴 Sin conexión Firebase'; fbEl.style.color='#ef4444'; }
        restaurarReservasLocal(phone);
        log(`⚠️ Modo local: ${e.message}`);
    }
    render();
}

// ── LOGIN ADMIN ───────────────────────────────
function renderLoginAdmin() {
    set('app', `
    <div class="card" style="max-width:400px;margin:80px auto;">
        <h2 class="center">🛡️ Acceso Admin</h2>
        <input type="password" id="inp-pass" placeholder="Contraseña admin">
        <button class="btn btn-warning w100" onclick="loginAdmin()">🔓 Entrar</button>
        <button class="btn btn-outline w100 mt" onclick="render()">← Volver</button>
        <div id="pass-msg" style="min-height:20px;margin-top:8px;font-weight:bold;color:#ef4444;"></div>
    </div>`);
    document.getElementById('inp-pass')?.addEventListener('keydown',e=>{if(e.key==='Enter')loginAdmin();});
}

function loginAdmin() {
    const pass = document.getElementById('inp-pass').value;
    if (pass !== ADMIN_PASS) { document.getElementById('pass-msg').textContent='❌ Contraseña incorrecta'; return; }
    S.adminOk = true;
    log('🛡️ Admin autenticado');
    render();
}

// ════════════════════════════════════════════
//  PANEL JUGADOR
// ════════════════════════════════════════════
function renderJugador() {
    const u = S.user;
    const reservasArr = Array.from(S.misReservas);
    const totalItems = reservasArr.length + S.cpSeleccionados.length;
    const btnVerifStyle = totalItems===0 ? 'display:none' : '';
    const btnSolStyle = (S.verificacionOk && totalItems>0) ? '' : 'opacity:.5;cursor:not-allowed;';

    set('app', `
    <div class="card">
        <div class="card-header">
            <div>
                <h2 style="margin:0;">👋 ${u.alias}</h2>
                <span style="font-size:.78rem;font-weight:bold;color:${S.fbConectado?'#10b981':'#ef4444'};">
                    ${S.fbConectado?'🟢 Firebase conectado':'🔴 Sin conexión'}
                </span>
            </div>
            <button class="btn btn-outline" onclick="logoutJugador()">🚪 Salir</button>
        </div>

        <!-- CARTONES APROBADOS (pagados) -->
        <div id="mis-pagados"></div>

// Página actual de la galería
let _pagGaleria = 0;
const PAG_SIZE = 20;

function cambiarPagGaleria(delta) {
    const total = _totalPagsGaleria || 1;
    _pagGaleria = Math.max(0, Math.min(_pagGaleria + delta, total - 1));
    renderGaleria();
}

function renderGaleria() {
    const g = document.getElementById('galeria');
    if (!g) return;

    // Cartones base: libres + los míos reservados (siempre visibles)
    const miosArr = S.cartones.filter(c => !c.esPersonalizado && S.misReservas.has(c.id));
    const miosIds = new Set(miosArr.map(c=>c.id));
    const libres = S.cartones.filter(c =>
        !c.esPersonalizado && !c.paid && !c.reserved && !miosIds.has(c.id)
    );
    let disponibles = [...miosArr, ...libres];

    // ── Paginación 20 en 20 ──
    const total = disponibles.length;
    const totalPags = Math.max(1, Math.ceil(total / PAG_SIZE));
    _totalPagsGaleria = totalPags;
    if (_pagGaleria >= totalPags) _pagGaleria = 0;
    const desde = _pagGaleria * PAG_SIZE;
    const pagina = disponibles.slice(desde, desde + PAG_SIZE);

    // ── Info y controles ──
    const info = document.getElementById('galeria-info');
    if (info) info.textContent = `${total} cartones disponibles`;
    const lbl = document.getElementById('pag-label');
    if (lbl) lbl.textContent = `${_pagGaleria+1} / ${totalPags}`;
    const prev = document.getElementById('btn-pag-prev');
    const next = document.getElementById('btn-pag-next');
    if (prev) prev.disabled = _pagGaleria === 0;
    if (next) next.disabled = _pagGaleria >= totalPags-1;

    // ── Render mini-cartones estilo v9 ──
    g.innerHTML = '';
    if (!pagina.length) {
        g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#94a3b8;">No se encontraron cartones</div>';
        return;
    }
    pagina.forEach(c => {
        const esMio = S.misReservas.has(c.id);
        // Contenedor externo
        const wrap = document.createElement('div');
        wrap.className = 'carton-container';

        // Mini-cartón
        const mc = document.createElement('div');
        mc.className = 'mini-carton' + (esMio ? ' reservado' : '');
        mc.id = 'mc-' + c.id;
        mc.onclick = () => toggleReserva(c.id);

        // Header "BINGO #ID"
        const hdr = document.createElement('div');
        hdr.className = 'mini-carton-header';
        hdr.innerHTML = `<span class="bingo-text">BINGO</span><span class="carton-id" style="${esMio?'color:#fbbf24;':''}">#${c.id}</span>`;
        mc.appendChild(hdr);

        // Grid B I N G O
        const grid = document.createElement('div');
        grid.className = 'carton-grid';
        LETRAS.forEach(l => {
            const col = document.createElement('div');
            col.className = 'carton-col';
            // Header letra
            const ch = document.createElement('div');
            ch.className = 'carton-header'; ch.textContent = l;
            col.appendChild(ch);
            // Celdas
            c.numbers[l].forEach((n, idx) => {
                const cel = document.createElement('div');
                cel.className = 'carton-cell';
                if (l === 'N' && idx === 2 && n === 'LIBRE') {
                    cel.classList.add('free'); cel.textContent = '★';
                } else { cel.textContent = n; }
                col.appendChild(cel);
            });
            grid.appendChild(col);
        });
        mc.appendChild(grid);
        wrap.appendChild(mc);
        g.appendChild(wrap);
    });
}

// Actualizar solo UN mini-cartón quirúrgicamente
function _actualizarMiniCarton(id) {
    const el = document.getElementById(`mc-${id}`);
    if (!el) return;
    const esMio    = S.misReservas.has(id);
    const carton   = S.cartones.find(c => c.id === id);
    const pagado   = carton && carton.paid;
    const deOtro   = carton && carton.reserved && !esMio;

    if (pagado || deOtro || esMio) {
        // ✅ Quitar de la grilla — ya reservado (propio o ajeno) o pagado
        el.closest('div')?.remove();
        return;
    }
    // Cartón libre — asegurar que no tenga clase reservado
    el.classList.remove('reservado','selected');
    const cidEl = el.querySelector('.carton-id');
    if (cidEl) cidEl.style.color = '';
}

// ── TOGGLE RESERVA ───────────────────────────
async function toggleReserva(id) {
    if (!S.user) return;
    const carton = S.cartones.find(c => c.id === id);
    if (!carton) return;
    if (S.misReservas.has(id)) { await cancelarReserva(id); return; }
    if (carton.reserved && carton.reservedBy !== S.user.phone) {
        notif('Ya reservado por otro jugador', 'error'); return;
    }

    // ✅ Reservar localmente PRIMERO — chips aparecen al instante
    carton.reserved = true;
    carton.reservedBy = S.user.phone;
    carton.reservedAlias = S.user.alias;
    S.misReservas.add(id);
    guardarReservasLocal();
    resetVerificacion();
    notif(`📌 Cartón #${id} reservado`);
    log(`📌 Cartón #${id} reservado`);
    renderChipsReservas();
    actualizarBloqueReservas();
    // ✅ Quitar de la galería al instante — evita que otro lo tome
    const mcWrap = document.getElementById('mc-' + id);
    if (mcWrap) { const p = mcWrap.parentElement; if (p) p.remove(); }

    // Sync a Firebase en segundo plano
    if (S.fbConectado) {
        try {
            const ref = db.collection('cartones_estado').doc(String(id));
            await db.runTransaction(async tx => {
                const doc = await tx.get(ref);
                const data = doc.exists ? doc.data() : {};
                if (data.reserved && data.reservedBy !== S.user.phone) {
                    // Otro lo tomó — revertir
                    carton.reserved = false; carton.reservedBy = null;
                    S.misReservas.delete(id);
                    guardarReservasLocal();
                    renderChipsReservas(); actualizarBloqueReservas(); _actualizarMiniCarton(id);
                    notif(`❌ Cartón #${id} ya fue tomado`, 'error');
                    throw new Error('REVERTIDO');
                }
                tx.set(ref, {
                    id, reserved: true, reservedBy: S.user.phone,
                    reservedAlias: S.user.alias, reservedAt: new Date().toISOString(),
                    ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
                }, {merge: true});
            });
        } catch(e) { if (e.message !== 'REVERTIDO') log('⚠️ Sync reserva: ' + e.message); }
    }
}

async function cancelarReserva(id) {
    const carton = S.cartones.find(c => c.id === id);
    if (carton) { carton.reserved = false; carton.reservedBy = null; }
    S.misReservas.delete(id);
    guardarReservasLocal();
    if (S.fbConectado) {
        await db.collection('cartones_estado').doc(String(id)).update({
            reserved: false, reservedBy: null, reservedAlias: null,
            ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(() => {});
    }
    resetVerificacion();
    log(`❌ Reserva cancelada: #${id}`);
    renderChipsReservas();
    actualizarBloqueReservas();
    _actualizarMiniCarton(id);
}

async function limpiarReservas() {
    if (!confirm('¿Limpiar TODAS tus reservas?')) return;
    for (const id of S.misReservas) {
        const c = S.cartones.find(x => x.id === id);
        if (c) { c.reserved = false; c.reservedBy = null; }
        if (S.fbConectado) await db.collection('cartones_estado').doc(String(id)).update({
            reserved: false, reservedBy: null, reservedAlias: null,
            ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(() => {});
    }
    S.misReservas.clear();
    S.cpSeleccionados = [];
    guardarReservasLocal();
    resetVerificacion();
    log('🗑️ Reservas limpiadas');
    renderChipsReservas();
    actualizarBloqueReservas();
    renderGaleria();
}

// ── PERSISTENCIA LOCAL — reservas sobreviven al cerrar ──
const STORAGE_KEY = 'luan_v10_reservas';

function guardarReservasLocal() {
    if (!S.user) return;
    const data = {
        phone: S.user.phone,
        alias: S.user.alias,
        reservas: Array.from(S.misReservas),
        cpSeleccionados: S.cpSeleccionados,
        solicitudEnviada: S.solicitudEnviada,
        savedAt: new Date().toISOString()
    };
    // Doble persistencia: sessionStorage (tab) + localStorage (cierre)
    try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify({...data, user: S.user})); } catch(e){}
    try { localStorage.setItem(STORAGE_KEY + '_' + S.user.phone, JSON.stringify(data)); } catch(e){}
}

function restaurarReservasLocal(phone) {
    try {
        // 1. Intentar sessionStorage primero (más fresco)
        const session = sessionStorage.getItem(STORAGE_KEY);
        if (session) {
            const d = JSON.parse(session);
            if (d.phone === phone && !d.solicitudEnviada) {
                (d.reservas||[]).forEach(id => S.misReservas.add(id));
                S.cpSeleccionados = d.cpSeleccionados||[];
                log(`📂 ${S.misReservas.size} reserva(s) restauradas (sesión)`);
                return;
            }
        }
        // 2. localStorage como fallback
        const raw = localStorage.getItem(STORAGE_KEY + '_' + phone);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (!data.solicitudEnviada) {
            (data.reservas||[]).forEach(id => S.misReservas.add(id));
            S.cpSeleccionados = data.cpSeleccionados||[];
            log(`📂 ${S.misReservas.size} reserva(s) restauradas (local)`);
        }
    } catch(e) { /* ignorar */ }
}

// ── SELECTOR RÁPIDO POR IDs ──────────────────
async function seleccionarRapido() {
    const input = document.getElementById('quick-ids')?.value.trim();
    if (!input) return;
    const ids = input.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)&&n>=1&&n<=660);
    if (!ids.length) { notif('❌ IDs válidos: 1-700','error'); return; }
    let sel=0, noDisp=0, yaMio=0;
    for (const id of ids) {
        if (S.misReservas.has(id)) { yaMio++; continue; }
        const c = S.cartones.find(x=>x.id===id);
        if (!c || c.paid || c.reserved) { noDisp++; continue; }
        await toggleReserva(id);
        sel++;
    }
    document.getElementById('quick-ids').value = '';
    let msg = '';
    if (sel)     msg += `✅ ${sel} seleccionado(s). `;
    if (yaMio)   msg += `ℹ️ ${yaMio} ya eran tuyos. `;
    if (noDisp)  msg += `❌ ${noDisp} no disponible(s).`;
    if (msg) notif(msg, sel>0?'success':'warning');
}

function buscarPorNumeros() {
    const input = document.getElementById('search-numbers')?.value.trim();
    const div = document.getElementById('search-results');
    if (!div) return;
    if (!input) { div.innerHTML = ''; return; }

    const nums = input.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)&&n>=1&&n<=75);
    if (!nums.length) {
        div.innerHTML = '<p style="color:#ef4444;padding:10px;text-align:center;">❌ Ingresa números válidos (1-75)</p>';
        return;
    }

    const encontrados = S.cartones.filter(c => {
        if (c.esPersonalizado || c.paid || c.reserved) return false;
        const todos = LETRAS.flatMap(l => c.numbers[l].filter(n=>n!=='LIBRE'));
        return nums.every(n => todos.includes(n));
    });

    div.innerHTML = '';

    if (!encontrados.length) {
        div.innerHTML = `<div style="text-align:center;padding:20px;background:#fef3c7;border-radius:10px;">
            <div style="font-size:2rem;">😔</div>
            <p style="color:#92400e;margin-top:8px;">No hay cartones con: <strong>${nums.join(', ')}</strong></p>
        </div>`;
        return;
    }

    const titulo = document.createElement('div');
    titulo.style.cssText = 'background:#10b981;color:white;padding:10px;border-radius:8px;margin-bottom:10px;text-align:center;font-weight:bold;';
    titulo.textContent = `✅ ${encontrados.length} cartón(es) encontrado(s)`;
    div.appendChild(titulo);

    // Mostrar hasta 5, con botón Reservar en cada uno
    encontrados.slice(0, 5).forEach(c => {
        const wrap = document.createElement('div');
        wrap.className = 'mini-carton';
        wrap.style.marginBottom = '10px';

        // Header
        const hdr = document.createElement('div');
        hdr.className = 'mini-carton-header';
        hdr.innerHTML = `<span class="bingo-text">BINGO</span><span class="carton-id">#${c.id}</span>`;
        wrap.appendChild(hdr);

        // Grid con números buscados resaltados en verde
        const grid = document.createElement('div');
        grid.className = 'carton-grid';
        LETRAS.forEach(l => {
            const col = document.createElement('div');

async function seleccionarRapido() {
    const input = document.getElementById('quick-ids')?.value.trim();
    if (!input) return;
    const ids = input.split(',').map(s=>parseInt(s.trim())).filter(n=>!isNaN(n)&&n>=1&&n<=660);
    if (!ids.length) { notif('❌ IDs válidos: 1-700','error'); return; }
    let sel=0, noDisp=0, yaMio=0;
    for (const id of ids) {
        if (S.misReservas.has(id)) { yaMio++; continue; }
        const c = S.cartones.find(x=>x.id===id);
        if (!c || c.paid || c.reserved) { noDisp++; continue; }
        await toggleReserva(id);
        sel++;
    }
    document.getElementById('quick-ids').value = '';
    let msg = '';
    if (sel)    msg += `${sel} seleccionado(s). `;
    if (yaMio)  msg += `${yaMio} ya tuyos. `;
    if (noDisp) msg += `${noDisp} no disp.`;
    if (msg) notif(msg.trim(), sel>0?'success':'warning');
}

// ── VERIFICAR DUPLICADOS ──────────────────────
async function verificarDuplicados() {
    const btn = document.getElementById('btn-verif');
    const rd  = document.getElementById('resultado-verif');
    if (!rd) return;

    if (S.misReservas.size === 0 && S.cpSeleccionados.length === 0) {
        rd.style.display='block';
        rd.innerHTML='<div class="verif-err">⚠️ No tienes cartones reservados aún.</div>';
        return;
    }
    if (btn) { btn.disabled=true; btn.textContent='⏳ Verificando...'; }
    rd.style.display='block'; rd.innerHTML='⏳ Consultando Firebase...';
    const ids = Array.from(S.misReservas);
    const problemas=[], ok=[];
    try {
        for (const id of ids) {
            const snap=await db.collection('cartones_estado').doc(String(id)).get();
            if(snap.exists){
                const d=snap.data();
                if(d.paid) problemas.push({id,tipo:'PAGADO',por:d.ownerAlias||d.ownerPhone||'otro'});
                else if(d.reserved&&d.reservedBy!==S.user.phone) problemas.push({id,tipo:'RESERVADO',por:d.reservedAlias||d.reservedBy||'otro'});
                else ok.push(id);
            } else ok.push(id);
        }
        // Verificar vs solicitudes de otros jugadores
        const solSnap=await db.collection('solicitudes_activacion')
            .where('estado','==','pendiente').get();
        solSnap.forEach(doc=>{
            const d=doc.data();
            if(d.jugadorId===S.user.phone) return;
            (d.cartonesEstandar||[]).forEach(cid=>{
                const numId=parseInt(cid);
                if(ids.includes(numId)&&!problemas.find(p=>p.id===numId)){
                    problemas.push({id:numId,tipo:'EN SOLICITUD',por:d.jugadorAlias||d.jugadorId});
                    const i=ok.indexOf(numId);if(i>-1)ok.splice(i,1);
                }
            });
        });
        if(problemas.length===0){
            S.verificacionOk=true;
            rd.innerHTML=`<div class="verif-ok">✅ ¡Todo limpio! ${ok.length} cartón(es) disponibles. Ya puedes solicitar activación.</div>`;
            actualizarBloqueReservas();
        } else {
            S.verificacionOk=false;
            rd.innerHTML=`<div class="verif-err"><strong>⚠️ ${problemas.length} conflicto(s) detectado(s):</strong><br><br>
                ${problemas.map(p=>`• Cartón #${p.id} — <strong>${p.tipo}</strong> por ${p.por}
                <button class="btn btn-danger" style="padding:3px 8px;font-size:.78rem;margin-left:6px;" onclick="cancelarReserva(${p.id})">🗑️ Liberar</button>`).join('<br>')}
                <br><br><small style="color:#64748b;">Libera los conflictivos y vuelve a verificar.</small></div>`;
        }
    } catch(e){
        rd.innerHTML=`<div class="verif-err">❌ Error al verificar: ${e.message}</div>`;
        log('❌ verificarDuplicados: '+e.message);
    } finally {
        if(btn){btn.disabled=false;btn.textContent='🔍 1. Verificar cartones antes de pagar';}
    }
}

function siguientePasoCP(){
    const letra=LETRAS[_cpPaso],cant=COLS_CP[letra];
    if(_cpTemp.length!==cant){notif(`Selecciona ${cant} números`,'warning');return;}

// ── SISTEMA DE IDs CP CON RECICLADO ──────────────
// IDs empiezan en 2000. Los IDs eliminados van a una cola
// y son reasignados antes de incrementar el contador.
async function obtenerSiguienteIdCP() {
    if (S.fbConectado) {
        // 1. Buscar IDs eliminados/disponibles para reciclar
        const snap = await db.collection('cp_ids_liberados').orderBy('liberadoEn').limit(1).get();
        if (!snap.empty) {
            const doc = snap.docs[0];
            const idNum = doc.data().idNum;
            await db.collection('cp_ids_liberados').doc(doc.id).delete();
            log(`♻️ CP ID reciclado: ✨${idNum}`);
            return idNum;
        }
        // 2. Obtener el máximo ID actual y asignar el siguiente
        const usadosSnap = await db.collection('cartones_personalizados').get();
        let maxId = 1999;
        usadosSnap.forEach(doc => {
            const num = parseInt(doc.id.replace('✨',''));
            if (!isNaN(num) && num > maxId) maxId = num;
        });
        return maxId + 1;
    } else {
        // Sin Firebase: usar el máximo de CPs locales
        const ids = S.misCPs.map(c => parseInt(c.id?.replace('✨',''))).filter(n => !isNaN(n));
        const maxId = ids.length ? Math.max(...ids) : 1999;
        return maxId + 1;
    }
}

async function liberarIdCP(idStr) {
    const idNum = parseInt(idStr.replace('✨',''));
    if (!isNaN(idNum) && S.fbConectado) {
        await db.collection('cp_ids_liberados').add({ idNum, liberadoEn: firebase.firestore.FieldValue.serverTimestamp() });
        log(`♻️ ID ${idStr} liberado para reasignación`);
    }
}

// ── CP ID MANAGER — cola de reciclado ─────────
async function obtenerSiguienteCPId() {
    if (!S.fbConectado) {
        // Modo local: usar timestamp simple
        return 2000 + Math.floor(Date.now() % 9000);
    }
    const ref = db.collection('config').doc('cp_ids');
    return await db.runTransaction(async tx => {
        const doc = await tx.get(ref);
        let nextId = 2000, recycled = [];
        if (doc.exists) {
            nextId   = doc.data().nextId   || 2000;
            recycled = doc.data().recycled || [];
        }
        let asignado;
        if (recycled.length > 0) {
            // ✅ Reusar el primero de la cola de reciclados
            asignado = recycled.shift();
            tx.set(ref, {nextId, recycled}, {merge:true});
        } else {
            asignado = nextId;
            tx.set(ref, {nextId: nextId + 1, recycled}, {merge:true});
        }
        return asignado;
    });
}

async function reciclarCPId(idNum) {
    if (!S.fbConectado || !idNum) return;
    const ref = db.collection('config').doc('cp_ids');
    await db.runTransaction(async tx => {
        const doc = await tx.get(ref);
        const recycled = doc.exists ? (doc.data().recycled || []) : [];
        if (!recycled.includes(idNum)) recycled.push(idNum);
        recycled.sort((a,b)=>a-b); // orden ascendente — el menor se asigna primero
        tx.set(ref, {recycled}, {merge:true});
    });
    log(`♻️ CP ID ${idNum} devuelto a la cola`);
}

async function guardarCP(){
    const idNum = await obtenerSiguienteCPId();
    const idStr = `✨${idNum}`;
    const cp = {
        id: idStr, idNumerico: idNum,
        numbers: _cpData, esPersonalizado: true,
        paid: false, owner: S.user.phone,
        ownerPhone: S.user.phone, ownerAlias: S.user.alias,
        creadoEn: new Date().toISOString(),
        lastActivityDate: new Date().toISOString()
    };
    if (S.fbConectado) {
        await db.collection('cartones_personalizados').doc(idStr).set({
            ...cp,
            creadoEn: firebase.firestore.FieldValue.serverTimestamp(),
            lastActivityDate: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection('cartones_estado').doc(idStr).set({
            id: idStr, esPersonalizado:true, paid:false,
            owner: S.user.phone, ownerPhone: S.user.phone, ownerAlias: S.user.alias,
            ultimaActualizacion: firebase.firestore.FieldValue.serverTimestamp()
        }, {merge:true});
    }
    S.cartones.push(cp);
    S.misCPs.push(cp);
    log(`✅ CP ${idStr} creado`);
    notif(`✅ CP ${idStr} creado exitosamente`);
    // Resetear estado del creador
    _cpPaso=0; _cpData={B:[],I:[],N:[],G:[],O:[]}; _cpTemp=[];
    cerrarModal();
    render();
}

async function aprobarSolicitud(solId){
    if(!confirm('¿Aprobar esta solicitud?'))return;
    try{
        const doc=await db.collection('solicitudes_activacion').doc(solId).get();
        const d=doc.data();const batch=db.batch();
        for(const cid of(d.cartonesEstandar||[])){
            const ref=db.collection('cartones_estado').doc(String(cid));
            const carton=S.cartones.find(c=>c.id===parseInt(cid));
            const numbers=carton?carton.numbers:null;
            batch.set(ref,{id:parseInt(cid),paid:true,reserved:false,reservedBy:null,reservedAlias:null,
                owner:d.jugadorId,ownerPhone:d.jugadorId,ownerAlias:d.jugadorAlias,numbers,
                fechaPago:firebase.firestore.FieldValue.serverTimestamp(),ultimaActualizacion:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
            const c=S.cartones.find(x=>x.id===parseInt(cid));
            if(c){c.paid=true;c.reserved=false;c.owner=d.jugadorId;c.ownerPhone=d.jugadorId;c.ownerAlias=d.jugadorAlias;}
        }
        for(const cpId of(d.cartonesPersonalizados||[])){
            batch.update(db.collection('cartones_personalizados').doc(cpId),{paid:true,ownerPhone:d.jugadorId,fechaPago:firebase.firestore.FieldValue.serverTimestamp()});
            batch.set(db.collection('cartones_estado').doc(cpId),{id:cpId,paid:true,esPersonalizado:true,owner:d.jugadorId,ownerPhone:d.jugadorId,ownerAlias:d.jugadorAlias,ultimaActualizacion:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
        }
        batch.update(db.collection('solicitudes_activacion').doc(solId),{estado:'aprobada',fechaAprobacion:new Date().toISOString()});
        await batch.commit();
        // ✅ WA completo al jugador — igual que v9
        const listaEst = (d.cartonesEstandar||[]).map((id,i)=>`${i+1}. 🎫 Cartón #${id}`).join('\n');
        const listaCPs = (d.cartonesPersonalizados||[]).length
            ? '\n\n✨ *Cartones Personalizados:*\n'+(d.cartonesPersonalizados.map((id,i)=>`${i+1}. ✨ CP #${id.replace('✨','')}`).join('\n'))
            : '';
        const msg = `✅ *ACTIVACIÓN COMPLETA - LUAN BINGO*\n\n`+
            `Estimado *${d.jugadorAlias}*,\n\n`+
            `Hemos procesado tu pago de *${d.totalPagado||0} Bs*.\n\n`+
            `✅ *TODOS TUS CARTONES ESTÁN ACTIVADOS:*\n${listaEst}${listaCPs}\n\n`+
            `🎰 ¡Ya puedes jugar con el app LUAN BINGO!\n`+
            `📋 ID Solicitud: ${solId}\n\n`+
            `¡Gracias por participar! 🎉`;
        // ✅ Mostrar enlace WA — no usar window.open (bloqueado en Chrome)
        const waUrl=`https://wa.me/${d.jugadorTelefono}?text=${encodeURIComponent(msg)}`;
        const modal=document.getElementById('modal-cp');
        const content=document.getElementById('modal-cp-content');
        content.innerHTML=`<div style="text-align:center;padding:10px;">
            <div style="font-size:2rem;">✅</div>
            <h3 style="color:#10b981;margin:8px 0;">Solicitud Aprobada</h3>
            <p style="color:#64748b;font-size:.9rem;margin-bottom:14px;">Ahora avisa al jugador <strong>${d.jugadorAlias}</strong> por WhatsApp:</p>
            <a href="${waUrl}" target="_blank"
               style="display:block;background:#25d366;color:white;padding:14px;border-radius:12px;font-weight:bold;font-size:1rem;text-decoration:none;text-align:center;margin-bottom:10px;">
               📱 Notificar a ${d.jugadorAlias} por WA
            </a>
            <button class="btn btn-ol w100" onclick="cerrarModal();renderSolicitudes();" style="padding:12px;">Cerrar</button>
        </div>`;
        modal.classList.add('active');
        log(`✅ Solicitud ${solId} aprobada — ${d.jugadorAlias}`);
    }catch(e){notif('❌ Error al aprobar: '+e.message,'error');}
}

    </div>

        <button class="btn btn-success" onclick="cantarAleatorio()">🎲 Cantar (aleatorio)</button>

    </div>

function construirTablero(){
    const t=document.getElementById('tablero-bingo');if(!t)return;t.innerHTML='';
    LETRAS.forEach(l=>{
        const col=document.createElement('div');col.className='col-bingo';
        col.innerHTML=`<div class="col-titulo">${l}</div><div class="nums-col" id="col-${l}"></div>`;
        t.appendChild(col);
        const nc=col.querySelector('.nums-col');
        const[mn,mx]=RANGOS[l];
        for(let n=mn;n<=mx;n++){
            const d=document.createElement('div');d.className='num-cel';d.textContent=n;d.id=`nc-${n}`;
            if(S.numerosCantados.includes(n))d.classList.add('cantado');
            d.onclick=()=>cantarNumero(n);nc.appendChild(d);
        }
    });
}
function cantarNumero(num){
    if(S.numerosCantados.includes(num)){if(!confirm(`¿Desmarcar el ${num}?`))return;S.numerosCantados=S.numerosCantados.filter(n=>n!==num);}
    else S.numerosCantados.push(num);
    actualizarUIJuego();verificarGanadoresAdmin();
    db.collection('estado_juego').doc('actual').set({numerosCantados:S.numerosCantados,timestamp:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(()=>{});
}
function cantarAleatorio(){
    const disp=[];for(let i=1;i<=75;i++)if(!S.numerosCantados.includes(i))disp.push(i);
    if(!disp.length){notif('¡Ya se cantaron todos!','warning');return;}
    cantarNumero(disp[Math.floor(Math.random()*disp.length)]);
}
function deshacerUltimo(){
    if(!S.numerosCantados.length)return;S.numerosCantados.pop();actualizarUIJuego();
    db.collection('estado_juego').doc('actual').set({numerosCantados:S.numerosCantados,timestamp:firebase.firestore.FieldValue.serverTimestamp()},{merge:true}).catch(()=>{});
}
function actualizarUIJuego(){
    for(let i=1;i<=75;i++){const el=document.getElementById(`nc-${i}`);if(el)el.className='num-cel'+(S.numerosCantados.includes(i)?' cantado':'');}
    const ult=document.getElementById('ultimo-num');
    if(ult&&S.numerosCantados.length){
        const n=S.numerosCantados[S.numerosCantados.length-1];
        const letra=n<=15?'B':n<=30?'I':n<=45?'N':n<=60?'G':'O';
        ult.textContent=`${letra}${n}`;
    }
    const dc=document.getElementById('nums-cantados-div');
    if(dc)dc.textContent=`📢 Cantados (${S.numerosCantados.length}/75): ${[...S.numerosCantados].sort((a,b)=>a-b).join(', ')}`;
    actualizarProximidadAdmin();
    const dg=document.getElementById('ganadores-div');
    if(dg&&S.ganadores.length)dg.innerHTML=`<h4>🏆 Ganadores</h4>${S.ganadores.map(id=>`<span class="chip-ok" style="display:inline-flex;padding:6px 14px;border-radius:20px;margin:3px;font-weight:bold;">🎫 #${id}</span>`).join('')}`;
}
function verificarGanadoresAdmin(){
    S.cartones.filter(c=>c.paid).forEach(carton=>{
        if(S.ganadores.includes(carton.id))return;
        let ok=true;
        for(let f=0;f<5&&ok;f++)for(let col=0;col<5&&ok;col++)
            if(S.patron[f][col]){const n=carton.numbers[LETRAS[col]][f];if(n!=='LIBRE'&&!S.numerosCantados.includes(n))ok=false;}
        if(ok){S.ganadores.push(carton.id);log(`🏆 BINGO — Cartón #${carton.id} de ${carton.ownerAlias||'?'}`);notif(`🎉 ¡BINGO! Cartón #${carton.id} de ${carton.ownerAlias||'?'}`);actualizarUIJuego();}
    });
}
function actualizarProximidadAdmin(){
    const div=document.getElementById('proximidad-div');if(!div)return;
    const res=S.cartones.filter(c=>c.paid&&!S.ganadores.includes(c.id)).map(c=>{
        let faltan=0;
        for(let f=0;f<5;f++)for(let col=0;col<5;col++)
            if(S.patron[f][col]){const n=c.numbers[LETRAS[col]][f];if(n!=='LIBRE'&&!S.numerosCantados.includes(n))faltan++;}
        return{id:c.id,owner:c.ownerAlias||'?',faltan};
    }).sort((a,b)=>a.faltan-b.faltan).slice(0,5);
    if(!res.length)return;
    div.innerHTML=`<h4 style="margin-bottom:8px;">🔥 Más cercanos</h4>`+res.map(r=>{
        const total=S.patron.flat().filter(Boolean).length-1||1;
        const pct=Math.max(0,100-(r.faltan/total*100));
        return `<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;font-size:.85rem;"><span>#${r.id} (${r.owner})</span><span>faltan ${r.faltan}</span></div>
        <div class="proximidad-bar"><div class="prox-fill" style="width:${pct}%"></div></div></div>`;
    }).join('');
}

Hola ${info.alias},

${info.ids.map(id=>'🎫 #'+id).join(', ')}

⏰ En 30 minutos serán liberados para otros jugadores.

LUAN BINGO 🎰`;

                </div>
                <a href="https://wa.me/${info.tel}?text=${encodeURIComponent(msg)}" target="_blank"

async function liberarCartonesNoPagados(){
    if(!confirm('¿Liberar AHORA todos los reservados sin pagar?'))return;
    try{
        const snap=await db.collection('cartones_estado').where('reserved','==',true).where('paid','==',false).get();
        if(snap.empty){notif('No hay cartones sin pagar','warning');return;}
        let n=0;
        for(let i=0;i<snap.docs.length;i+=400){
            const batch=db.batch();
            snap.docs.slice(i,i+400).forEach(doc=>{
                batch.update(doc.ref,{reserved:false,reservedBy:null,reservedAlias:null,reservedAt:null,liberadoEn:new Date().toISOString(),ultimaActualizacion:firebase.firestore.FieldValue.serverTimestamp()});
                const id=doc.data().id||parseInt(doc.id);const c=S.cartones.find(x=>x.id===id);
                if(c){c.reserved=false;c.reservedBy=null;}n++;
            });
            await batch.commit();
        }
        log(`🔓 ${n} cartones liberados`);notif(`✅ ${n} cartones liberados`);
    }catch(e){notif('❌ Error: '+e.message,'error');}
}

// ── RESET DÍA ─────────────────────────────────
async function resetDia(){
    if(!confirm('🌅 NUEVO DÍA\n\nSe borran: reservas, ventas, solicitudes, números cantados.\nNO se borran: CPs, usuarios.\n\n¿Continuar?'))return;
    if(!confirm('🚨 Última confirmación — ¿INICIAR NUEVO DÍA?'))return;
    try{
        for(const col of['cartones_estado','solicitudes_activacion']){
            const snap=await db.collection(col).get();
            for(let i=0;i<snap.docs.length;i+=400){const b=db.batch();snap.docs.slice(i,i+400).forEach(d=>b.delete(d.ref));await b.commit();}
        }
        await db.collection('estado_juego').doc('actual').set({activo:false,numerosCantados:[],timestamp:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
        S.numerosCantados=[];S.ganadores=[];
        S.cartones.forEach(c=>{if(!c.esPersonalizado){c.reserved=false;c.paid=false;c.owner=null;c.ownerPhone=null;c.ownerAlias=null;c.reservedBy=null;}});
        log('🌅 NUEVO DÍA completado');notif('✅ Sistema reiniciado');renderAdmin();
    }catch(e){notif('❌ Error: '+e.message,'error');}
}

//  FIREBASE REALTIME + CPs

function suscribirCartones(){
    if(S._unsubCartones){S._unsubCartones();S._unsubCartones=null;}
    if(S._unsubRecientes){S._unsubRecientes();S._unsubRecientes=null;}
    if(!S.user) return;
    const phone=S.user.phone;
    let huboCambio=false;

    // ── Listener 1: mis cartones (reservados o pagados) ──
    S._unsubCartones=db.collection('cartones_estado')
        .where('reservedBy','==',phone)
        .onSnapshot(snap=>{
            snap.docChanges().forEach(ch=>{
                const d=ch.doc.data();const id=d.id||parseInt(ch.doc.id)||ch.doc.id;
                const c=S.cartones.find(x=>x.id===id);if(!c)return;
                c.reserved=d.reserved||false;c.reservedBy=d.reservedBy||null;
                c.paid=d.paid||false;c.owner=d.owner||d.ownerPhone||null;
                c.ownerPhone=d.ownerPhone||d.owner||null;c.ownerAlias=d.ownerAlias||null;
                if(d.paid&&(d.ownerPhone===phone||d.owner===phone)){
                    S.misReservas.delete(id);
                    guardarEstadoSesion();
                    notif('✅ Cartón #'+id+' APROBADO — ¡ya puedes jugar!','success',4000);
                }
            });
            mostrarCartonesAprobados();
            actualizarVistaReservas();
        },e=>log('⚠️ Listener mis cartones: '+e.message));

    // ── Listener 2: cambios recientes de OTROS (últimos 2 min) ──
    const hace2min=firebase.firestore.Timestamp.fromDate(new Date(Date.now()-120000));
    S._unsubRecientes=db.collection('cartones_estado')
        .where('ultimaActualizacion','>=',hace2min)
        .onSnapshot(snap=>{
            snap.docChanges().forEach(ch=>{
                const d=ch.doc.data();const id=d.id||parseInt(ch.doc.id)||ch.doc.id;
                if(d.reservedBy===phone)return;
                const c=S.cartones.find(x=>x.id===id);if(!c)return;
                const cambio=(c.reserved!==(d.reserved||false));
                c.reserved=d.reserved||false;c.reservedBy=d.reservedBy||null;
                c.paid=d.paid||false;
                if(cambio)huboCambio=true;
            });
            if(huboCambio){huboCambio=false;invalidarCacheCartones();mostrarGaleriaCartones();actualizarEstadisticasHome();}
        },e=>log('⚠️ Listener recientes: '+e.message));
}
async function cargarCPsJugador(phone){
    S.misCPs=[];
    try{
        const snap=await db.collection('cartones_personalizados').where('ownerPhone','==',phone).get();
        snap.forEach(doc=>{
            const d=doc.data();d.id=doc.id;d.esPersonalizado=true;d.idNumerico=parseInt(doc.id.replace('✨',''))||0;
            S.misCPs.push(d);const existe=S.cartones.find(c=>c.id===doc.id);
            if(!existe)S.cartones.push(d);else Object.assign(existe,d);
        });
        log(`✨ ${snap.size} CP(s) cargados`);
    }catch(e){log('⚠️ CPs: '+e.message);}
}

async function init(){
    // 1. Home inmediato
    render();

    // 2. Disparar signInAnonymously sin bloquear (igual que v9 — funciona)
    // Auth anónima — opcional, falla en file:// pero Firestore sigue funcionando
    firebase.auth().signInAnonymously().catch(()=>{});

    // 3. Conectar Firestore directamente
    try {
        const confSnap = await db.collection('config').doc('general').get();
        if (confSnap.exists) S.precio = confSnap.data().valorCarton || 0;

        S.fbConectado = true;
        log('✅ Firebase conectado — luanbingoadmin');
        console.log('✅ LuanBingo v10 — Firebase OK');

        // Badge
        const fbB = document.getElementById('fb-badge');
        if (fbB) { fbB.textContent = '🟢 Firebase'; fbB.style.background = '#10b981'; }
        const fbSt = document.getElementById('fb-status');
        if (fbSt) { fbSt.textContent = '🟢 Firebase conectado'; fbSt.style.color = '#10b981'; }

        // Estado juego
        const estDoc = await db.collection('estado_juego').doc('actual').get();
        if (estDoc.exists) S.numerosCantados = estDoc.data().numerosCantados || [];

        // Sincronizar cartones reservados/pagados
        const cartSnap = await db.collection('cartones_estado').get();
        cartSnap.forEach(doc => {
            const d = doc.data();
            const id = d.id || parseInt(doc.id) || doc.id;
            const c = S.cartones.find(x => x.id === id);
            if (c) {
                c.reserved   = d.reserved   || false;
                c.reservedBy = d.reservedBy  || null;
                c.paid       = d.paid        || false;
                c.owner      = d.owner       || d.ownerPhone || null;
                c.ownerPhone = d.ownerPhone  || d.owner      || null;
                c.ownerAlias = d.ownerAlias  || null;
            }
        });

        actualizarEstadisticasHome();
        setInterval(verificarLiberacionAutomatica, 60000);

    } catch(e) {
        S.fbConectado = false;
        log('⚠️ Sin Firebase — modo local: ' + e.message);
        console.error('❌ Firebase error:', e);
        const fbBo = document.getElementById('fb-badge');
        if (fbBo) { fbBo.textContent = '🔴 ' + e.message.slice(0, 35); fbBo.style.background = '#ef4444'; }
        const fbSto = document.getElementById('fb-status');
        if (fbSto) { fbSto.textContent = '🔴 ' + e.message; fbSto.style.color = '#ef4444'; }
    }
}
function verificarLiberacionAutomatica() {
    if (!S.horaInicio) return;
    const ahora = new Date();
    const minRestantes = Math.floor((S.horaInicio - ahora) / 60000);
    if (minRestantes <= 30 && minRestantes >= -5) {
        const ultima = localStorage.getItem('v10_ultima_lib');
        const tiempoDesde = ultima ? (Date.now() - parseInt(ultima)) : Infinity;
        if (tiempoDesde > 7200000) {
            liberarCartonesNoPagados();
            localStorage.setItem('v10_ultima_lib', Date.now().toString());
            log('🔓 Liberación automática');
        }
    }
}
